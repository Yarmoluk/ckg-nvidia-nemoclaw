name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Import check
        run: python -c "import ckg_nvidia_nemoclaw; print('ok')"
      - name: List domains
        run: python -c "from ckg_nvidia_nemoclaw.server import list_domains; print(list_domains())"
